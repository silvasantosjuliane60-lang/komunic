<head>

  <style>
    * { box-sizing: border-box; user-select: none; }
    body {
      margin: 0; padding: 20px;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Fredoka', sans-serif;
      background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    h1 { color: #2c3e50; margin-bottom: 5px; text-shadow: 2px 2px #fff; }
    p.instrucao { font-size: 1.2rem; color: #34495e; margin-top: 0; }
    .game-container {
      display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
      background: white; padding: 20px; border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15); max-width: 900px; width: 100%;
    }
    .panel {
      flex: 1; min-width: 280px; background: #f8f9fa; border: 3px dashed #bdc3c7;
      border-radius: 15px; padding: 15px; display: flex; flex-direction: column; align-items: center;
    }
    .panel h2 { margin-top: 0; color: #e67e22; }
    .pieces-tray {
      display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; min-height: 200px;
    }
    .piece { cursor: grab; transition: transform 0.2s, filter 0.2s; }
    .piece:hover { transform: scale(1.05); filter: brightness(1.1); }
    .piece:active { cursor: grabbing; }
    .drop-zone {
      width: 100%; height: 320px; position: relative; background: #edf2f7;
      border-radius: 12px; border: 2px solid #cbd5e0; overflow: hidden;
    }
    .target-slot {
      position: absolute; border: 3px stroke #a0aec0; background: rgba(160, 174, 192, 0.2);
      transition: all 0.3s ease;
    }
    .target-slot.filled { background: transparent; border: none; }
    
    .btn-proximo, .btn-voltar {
      margin-top: 20px; padding: 15px 30px; font-size: 1.3rem; font-weight: bold; color: white;
      border: none; border-radius: 50px; cursor: pointer; transition: all 0.1s;
    }
    .btn-proximo { background: #2ecc71; box-shadow: 0 5px 0 #27ae60; }
    .btn-proximo:active { transform: translateY(4px); box-shadow: 0 1px 0 #27ae60; }
    .btn-voltar { background: #95a5a6; box-shadow: 0 5px 0 #7f8c8d; padding: 10px 20px; font-size: 1.1rem; margin-top: 10px; }
    .btn-voltar:active { transform: translateY(4px); box-shadow: 0 1px 0 #7f8c8d; }
    
    .celebracao {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255, 255, 255, 0.95);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
    }
    .celebracao.active { opacity: 1; pointer-events: auto; }
    .celebracao h1 {
      font-size: 3rem; color: #9b59b6; text-align: center;
      animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }
  </style>

    // --- ÁUDIO GRAVADO (MP3) ---
    let currentVoice = null;
    function falarMP3(nomeArquivo) {
      if(currentVoice) { currentVoice.pause(); currentVoice.currentTime = 0; }
      currentVoice = new Audio(`assets/audio/${nomeArquivo}.mp3`);
      currentVoice.play().catch(e => console.log('Áudio MP3 falhou:', e));
    }

    // --- EFEITOS SONOROS MÁGICOS (WEB AUDIO API) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function tocarSomEncaixe() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const t = audioCtx.currentTime;
      // Oscilador 1: Pluck suave
      const osc1 = audioCtx.createOscillator();
      const gain1 = audioCtx.createGain();
      osc1.type = 'sine';
      osc1.frequency.setValueAtTime(880, t); // A5
      osc1.frequency.exponentialRampToValueAtTime(1760, t + 0.1); // A6
      
      gain1.gain.setValueAtTime(0, t);
      gain1.gain.linearRampToValueAtTime(0.4, t + 0.05);
      gain1.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
      
      osc1.connect(gain1);
      gain1.connect(audioCtx.destination);
      osc1.start(t);
      osc1.stop(t + 0.3);
      
      // Oscilador 2: Brilho agudo
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'triangle';
      osc2.frequency.setValueAtTime(1318.51, t); // E6
      
      gain2.gain.setValueAtTime(0, t);
      gain2.gain.linearRampToValueAtTime(0.2, t + 0.05);
      gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
      
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(t);
      osc2.stop(t + 0.2);
    }

    function tocarSomVitoria() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      // Acorde Mágico de Vitória: C5, E5, G5, C6
      const notas = [523.25, 659.25, 783.99, 1046.50, 1318.51]; 
      
      notas.forEach((freq, i) => {
        const t = audioCtx.currentTime + (i * 0.1);
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t);
        
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.3, t + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 1.0);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(t);
        osc.stop(t + 1.0);
      });
    }

          { id: 7, tipo: "retangulo", cor: "#48dbfb", width: 20, height: 50, targetX: 150, targetY: 180, svg: `<rect width="20" height="50" fill="#48dbfb"/>`, som: "tangram_peca_retangulo" }
        ]
      }
    ];

    let faseAtual = 0;
    let pecasEncaixadas = 0;

    function carregarJogo(iniciando = false) {
      if (faseAtual >= FIGURAS.length) {
        faseAtual = 0; // Reinicia se passar de todas
      }
      
      const figura = FIGURAS[faseAtual];
      document.getElementById('target-title').innerText = `Construa: ${figura.nome}`;
      
      const tray = document.getElementById('tray');
      const dropZone = document.getElementById('dropZone');
      tray.innerHTML = '';
      dropZone.innerHTML = '';
      pecasEncaixadas = 0;

      // Fala inicial da fase
      if(iniciando) {
        falarMP3('tangram_intro');
        setTimeout(() => falarMP3(`tangram_montar_${figura.id}`), 4000);
      } else {
        falarMP3(`tangram_montar_${figura.id}`);
      }

      // Embaralhar peças para a bandeja
      const pecasEmbaralhadas = [...figura.pecas].sort(() => Math.random() - 0.5);

      pecasEmbaralhadas.forEach(peca => {
        // Peça solta
        const el = document.createElement('div');
        el.className = 'piece';
        el.id = `piece-${peca.id}`;
        el.innerHTML = `<svg width="${peca.width}" height="${peca.height}">${peca.svg}</svg>`;
        el.onclick = () => tentarEncaixarDirecto(peca);
        tray.appendChild(el);

        // Slot
        const slot = document.createElement('div');
        slot.className = 'target-slot';
        slot.id = `slot-${peca.id}`;
        slot.style.width = peca.width + 'px';
        slot.style.height = peca.height + 'px';
        slot.style.left = peca.targetX + 'px';
        slot.style.top = peca.targetY + 'px';
        slot.innerHTML = `<svg width="${peca.width}" height="${peca.height}" style="opacity: 0.3;">${peca.svg}</svg>`;
        dropZone.appendChild(slot);
      });
    }

    function tentarEncaixarDirecto(peca) {
      const pieceEl = document.getElementById(`piece-${peca.id}`);
      const slotEl = document.getElementById(`slot-${peca.id}`);

      if (!pieceEl || slotEl.classList.contains('filled')) return;

      // Move a peça para o slot correto
      slotEl.innerHTML = `<svg width="${peca.width}" height="${peca.height}">${peca.svg}</svg>`;
      slotEl.classList.add('filled');
      pieceEl.remove();

      pecasEncaixadas++;

      tocarSomEncaixe();
      falarMP3(peca.som);

      // Verifica vitória
      const figura = FIGURAS[faseAtual];
      if (pecasEncaixadas === figura.pecas.length) {
        // Toca o som de vitória imediatamente para indicar sucesso
        tocarSomVitoria();
        falarMP3(`tangram_vitoria_${figura.id}`);

        // Dá 2.5 segundos para a criança observar a figura completa
        setTimeout(() => {
          document.getElementById('textoCelebracao').innerHTML = `🎉 Parabéns!<br>Você formou ${figura.nome}!`;
          
          if(faseAtual === FIGURAS.length - 1) {
            setTimeout(() => falarMP3('tangram_concluiu_tudo'), 3000);
          }
          
          document.getElementById('celebracao').classList.add('active');
        }, 2500);
      }
    }

    function avancarFase() {
      document.getElementById('celebracao').classList.remove('active');
      faseAtual++;
      carregarJogo(false);
    }

    function reiniciarJogo() {
      document.getElementById('celebracao').classList.remove('active');
      faseAtual = 0;
      carregarJogo(true);
    }

    // Inicializa
    window.onload = () => carregarJogo(true);
  </script>
